name: CI

on:
  push:
    branches: [master]
    paths:
      - "bt_strategy/**"
      - ".github/workflows/**"
  pull_request:
    branches: [master]
    paths:
      - "bt_strategy/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout bt_sdk
        uses: actions/checkout@v4
        with:
          repository: andytam101/bt_sdk
          path: bt_sdk
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bt_sdk
        run: pip install -e bt_sdk

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check
        run: |
          ruff format --check .
          ruff check .

      - name: Type check
        run: mypy .

      - name: Test
        run: pytest